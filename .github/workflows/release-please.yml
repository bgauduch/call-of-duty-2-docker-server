name: release-please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4.4.1
        id: release
        with:
          # Configuration files centralized in .github/config
          config-file: .github/config/release-please-config.json
          manifest-file: .github/config/release-please-manifest.json
          # Use PAT to trigger downstream workflows (build-test-push)
          # GITHUB_TOKEN doesn't trigger workflows to prevent recursive triggers
          # See: https://docs.github.com/en/actions/concepts/security/github_token
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
